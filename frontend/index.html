<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/style.css" rel="stylesheet">
    <title>NetChecker</title>
</head>
<body>
<div id="app">
    <div class="window">
        <div class="topbar glass">
            <div style="position:absolute; left:14px; display:flex; gap:10px; align-items:center;">
                <div style="font-weight:800; letter-spacing:.5px;">NetChecker</div>

                <div class="navtabs">
                    <a class="navtab" href="#dashboard">Dashboard</a>
                    <a class="navtab" href="#settings">
                        <span class="dirty-dot" style="display:none" title="Unsaved changes"></span>
                        Settings
                    </a>
                </div>


            </div>
            <div class="topbar-right">
                <button id="btnSave" class="btn secondary" disabled="">Save</button>
                <button id="btnStartStop" class="btn primary">Start</button>
            </div>

        </div>


        <div class="content">
            <div id="dashboard" class="tabpanel">
                <div class="navtabs">
                    <button id="tabDashboard" class="navtab ">Dashboard</button>
                    <button id="tabSettings" class="navtab active">
                        <span id="dirtyDot" class="dirty-dot" style="display:none" title="Unsaved changes"></span>
                        Settings
                    </button>
                </div>
            </div>

            <div id="settings" class="tabpanel">
                ...
            </div>
        </div>
        <div class="statusbar glass">
            <span id="sb_run" class="status-dot muted"></span>
            <span id="sb_text">stopped</span>
            <span class="sep">|</span>
            <span id="sb_trace">trace workers: 0/2 (q:0)</span>
            <span class="sep">|</span>
            <span id="db_size"></span>

            <span class="spacer"></span>

            <span id="sb_ver" class="muted">v0.0.0-dev</span>
        </div>
    </div>
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
